name: Deploy Lambda-S3 AWS Infrastructure

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  AWS_REGION: us-east-2
  PYTHON_VERSION: "3.14"

jobs:
  pre_deploy_tests:
    name: Run Unit and Template Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest for processor and CDK stack
        run: pytest tests/test_processor.py tests/test_cdk_stack.py

  deploy:
    name: Deploy Stack
    runs-on: ubuntu-latest
    needs: pre_deploy_tests
    if: github.event_name == 'push'
    outputs:
      stack_name: ${{ steps.resolve-target.outputs.stack_name }}
      run_post_deploy: ${{ steps.resolve-target.outputs.run_post_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deployment dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target stack from branch
        id: resolve-target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "stack_name=SixthStreetAssessment-Prod" >> "${GITHUB_OUTPUT}"
            echo "run_post_deploy=false" >> "${GITHUB_OUTPUT}"
          else
            echo "stack_name=SixthStreetAssessment-Dev" >> "${GITHUB_OUTPUT}"
            echo "run_post_deploy=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Preview CDK diff
        run: cdk diff ${{ steps.resolve-target.outputs.stack_name }}

      - name: Deploy selected stack
        run: cdk deploy ${{ steps.resolve-target.outputs.stack_name }} --require-approval never

  post_deploy_validation:
    name: Validate Deployed Runtime (Dev/Test)
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.outputs.run_post_deploy == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install runtime validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run post-deployment validation
        run: pytest tests/validate_post_deployment.py